<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumber Company UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui" class="hidden">

    <!-- HEADER -->
    <div class="header">
        <div class="title">LUMBER COMPANY</div>
        <div class="close" id="closeBtn">X</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" data-tab="storage">Storage</div>
        <div class="tab" data-tab="shopfront">Shopfront</div>
        <div class="tab" data-tab="processing">Processing</div>
        <div class="tab" data-tab="deliveries">Deliveries</div>
        <div class="tab" data-tab="office">Office</div>
    </div>

    <!-- CONTENT PANELS -->
    <div class="panel" id="storagePanel"></div>
    <div class="panel hidden" id="shopfrontPanel"></div>
    <div class="panel hidden" id="processingPanel"></div>
    <div class="panel hidden" id="deliveriesPanel"></div>
    <div class="panel hidden" id="officePanel"></div>

</div>

<script src="app.js"></script>
</body>
</html>
